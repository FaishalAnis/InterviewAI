version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: interviewai_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interviewai_frontend
    restart: always
    environment:
      - VITE_API_URL=/api/v1
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewai_backend
    restart: always
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=supersecretkeychangeinproduction1234567890
      - REFRESH_SECRET_KEY=superrefreshsecretkeychangeinproduction0987654321
    depends_on:
      - mongodb
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewai_celery
    restart: always
    command: celery -A app.core.celery.celery_app worker --loglevel=info
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=supersecretkeychangeinproduction1234567890
      - REFRESH_SECRET_KEY=superrefreshsecretkeychangeinproduction0987654321
    depends_on:
      - mongodb
      - redis
      - backend

  mongodb:
    image: mongo:latest
    container_name: interviewai_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: interviewai_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
