services:
  # Backend Web Service
  - type: web
    name: interviewai-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_NAME
        value: interviewai
      - key: SECRET_KEY
        generateValue: true
      - key: API_V1_STR
        value: /api/v1
      - key: MONGODB_URL
        sync: false # User will provide their MongoDB Atlas connection string in Render Dashboard

  # Frontend Static Site
  - type: static
    name: interviewai-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: interviewai-backend
          type: web
          property: host
    routes:
      # Support client-side routing (React Router SPA fallback)
      - type: rewrite
        source: /*
        destination: /index.html
